<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Meeting Scribe{% endblock %}</title>
  {% block head %}{% endblock %}
  <style>
    :root { --bg:#0f1115; --card:#181b22; --line:#2a2f3a; --fg:#e6e8ec; --muted:#9aa3b2; --accent:#6ea8fe; }
    * { box-sizing: border-box; }
    body { margin:0; font:16px/1.55 system-ui, sans-serif; background:var(--bg); color:var(--fg); }
    a { color:var(--accent); text-decoration:none; }
    a:hover { text-decoration:underline; }
    header { border-bottom:1px solid var(--line); padding:14px 24px; display:flex; gap:20px; align-items:center; }
    header h1 { font-size:18px; margin:0; }
    header nav { margin-left:auto; display:flex; gap:18px; }
    main { max-width:960px; margin:0 auto; padding:24px; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:18px 20px; margin-bottom:18px; }
    .muted { color:var(--muted); font-size:14px; }
    .pill { display:inline-block; font-size:12px; padding:2px 8px; border:1px solid var(--line); border-radius:999px; color:var(--muted); margin-right:6px; }
    h2 { font-size:16px; margin:0 0 10px; }
    input[type=text], textarea, select { width:100%; background:#0f1218; color:var(--fg); border:1px solid var(--line); border-radius:8px; padding:9px 11px; font:inherit; }
    textarea { min-height:70px; resize:vertical; }
    button { background:var(--accent); color:#06101f; border:0; border-radius:8px; padding:9px 16px; font:inherit; font-weight:600; cursor:pointer; }
    button.secondary { background:#222733; color:var(--fg); border:1px solid var(--line); }
    label { display:block; font-size:13px; color:var(--muted); margin:12px 0 4px; }
    pre { white-space:pre-wrap; word-wrap:break-word; background:#0f1218; border:1px solid var(--line); border-radius:8px; padding:14px; font:13px/1.5 ui-monospace, monospace; }
    .summary :first-child { margin-top:0; }
    .row { display:flex; gap:12px; flex-wrap:wrap; }
    .grow { flex:1; }
    .list-item { display:flex; align-items:baseline; gap:10px; padding:12px 0; border-bottom:1px solid var(--line); }
    .list-item:last-child { border-bottom:0; }
    .banner { display:flex; gap:16px; align-items:center; }
    .banner h2 { margin:0 0 4px; }
    .spinner { width:34px; height:34px; flex:none; border-radius:50%;
      border:4px solid #2a2f3a; border-top-color:var(--accent); animation:spin 0.9s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .steps { margin:10px 0 0; padding:0; list-style:none; font-size:14px; }
    .steps li { padding:3px 0; color:var(--muted); }
    .steps li.done { color:#7ee787; }
    .steps li.active { color:var(--fg); font-weight:600; }
    .bar { height:12px; background:#0f1218; border:1px solid var(--line); border-radius:999px; overflow:hidden; margin-top:10px; }
    .bar-fill { height:100%; background:var(--accent); border-radius:999px; transition:width 0.4s ease; }
    .bar-indef { width:35% !important; animation:slide 1.4s ease-in-out infinite; }
    @keyframes slide { 0%{margin-left:-35%} 100%{margin-left:100%} }
    audio { width:100%; margin-top:4px; }
    .transcript { background:#0f1218; border:1px solid var(--line); border-radius:8px; padding:14px;
      font:13px/1.7 ui-monospace, monospace; max-height:520px; overflow:auto; white-space:normal; }
    .transcript a.ts { color:var(--accent); text-decoration:none; margin-right:4px; }
    .transcript a.ts:hover { text-decoration:underline; }
    .actions { display:flex; gap:8px; }
    .actions a, .actions button { font-size:13px; padding:5px 12px; }
    a.btn { background:#222733; color:var(--fg); border:1px solid var(--line); border-radius:8px; padding:6px 12px; display:inline-block; }
    a.btn:hover { text-decoration:none; border-color:var(--accent); }
    .cardhead { display:flex; align-items:center; gap:12px; margin-bottom:10px; }
    .cardhead h2 { margin:0; }
    .cardhead .actions { margin-left:auto; }
  </style>
</head>
<body>
  <header>
    <h1><a href="/">📝 Meeting Scribe</a></h1>
    <form action="/search" method="get" style="margin-left:auto; max-width:340px; flex:1;">
      <input type="text" name="q" value="{{ q or '' }}" placeholder="Search meetings…">
    </form>
    <nav>
      <a href="/">Meetings</a>
      <a href="/meet">Record Meet</a>
      <a href="/ask">Ask all</a>
      <a href="/settings">Settings</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
